apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: fastapi-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: api.yourdomain.com

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: fastapi-service

            port:
              number: 80